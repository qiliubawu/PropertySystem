name: Build & Deploy PropertySystem

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # Convert from SQL Server to SQLite for free cloud deployment
      - name: Add SQLite package
        run: dotnet add package Microsoft.EntityFrameworkCore.Sqlite --version 8.0.*

      # Replace UseSqlServer with UseSqlite in Program.cs
      - name: Switch to SQLite
        run: |
          sed -i 's/UseSqlServer/UseSqlite/' Program.cs
          sed -i 's|Server=.*Database=PropertySystemDB.*Trusted_Connection=True.*TrustServerCertificate=True|Data Source=PropertySystem.db|' appsettings.json

      - name: Build
        run: dotnet build --configuration Release

      - name: Publish
        run: dotnet publish --configuration Release -o publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: property-system
          path: publish/
